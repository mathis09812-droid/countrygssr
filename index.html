<!DOCTYPE html>
<html lang="en" data-theme="sunset">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CountryGuessr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="topbar-left">
      <h1 class="logo">Country<span class="logo-accent">Guessr</span></h1>
    </div>
    <div class="topbar-right">
      <!-- Language Toggle -->
      <div class="lang-toggle" id="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
      <!-- Theme Picker -->
      <div class="theme-picker" id="theme-picker">
        <button class="theme-dot" data-theme="sunset" title="Sunset"></button>
        <button class="theme-dot" data-theme="coral" title="Coral"></button>
        <button class="theme-dot" data-theme="lavender" title="Lavender"></button>
        <button class="theme-dot" data-theme="berry" title="Berry"></button>
      </div>
      <!-- Timer -->
      <button id="timer-toggle" class="icon-btn" title="Timer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3l2 2"/><path d="M19 3l-2 2"/><path d="M12 5V3"/></svg>
      </button>
      <!-- Give Up -->
      <button id="giveup-btn" class="giveup-btn hidden">Give Up</button>
      <!-- Restart -->
      <button id="restart-btn" class="icon-btn" title="Restart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
    </div>
  </header>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- MAIN LAYOUT -->
  <main id="main">

    <!-- LEFT: MAP PANEL -->
    <section id="map-section">
      <div id="map-container">
        <div id="map-loading">
          <div class="loader-ring"></div>
          <span>Loading map...</span>
        </div>
      </div>
      <!-- Continent Tabs -->
      <div id="continent-tabs"></div>
    </section>

    <!-- RIGHT: SIDEBAR -->
    <aside id="sidebar">

      <!-- Timer -->
      <div id="timer-display" class="hidden">
        <span id="timer-value">00:00</span>
      </div>

      <!-- Input -->
      <div class="input-wrapper">
        <input id="country-input" type="text" placeholder="Type a country name..." autocomplete="off" spellcheck="false" />
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
      </div>

      <!-- Score -->
      <div class="score-card">
        <div class="score-header">
          <div class="score-numbers">
            <span id="score-current" class="score-big">0</span>
            <span class="score-divider">/</span>
            <span id="score-total" class="score-total">197</span>
          </div>
          <span id="score-pct" class="score-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill" style="width:0%"></div>
        </div>
        <span id="remaining-text" class="score-remaining">197 remaining</span>
      </div>

      <!-- Guessed Countries (grouped by continent) -->
      <div class="guessed-section">
        <h2 class="section-title" id="guessed-title">Guessed Countries</h2>
        <div id="guessed-list" class="guessed-list"></div>
      </div>

    </aside>
  </main>

  <!-- TOOLTIP (hover on guessed country) -->
  <div id="tooltip" class="tooltip hidden">
    <div class="tooltip-header">
      <img id="tt-flag" class="tooltip-flag" alt="" />
      <div>
        <div id="tt-name" class="tooltip-name"></div>
        <div id="tt-continent" class="tooltip-continent"></div>
      </div>
    </div>
    <div class="tooltip-grid">
      <span class="tooltip-label">Capital</span><span id="tt-capital"></span>
      <span class="tooltip-label">Population</span><span id="tt-population"></span>
      <span class="tooltip-label">GDP</span><span id="tt-gdp"></span>
    </div>
  </div>

  <!-- COUNTRY PREVIEW PANEL (click on guessed country) -->
  <div id="country-preview" class="country-preview hidden">
    <div class="preview-overlay" id="preview-overlay"></div>
    <div class="preview-panel">
      <button id="preview-close" class="preview-close">&times;</button>
      <!-- Banner -->
      <div class="preview-banner" id="preview-banner">
        <img id="preview-banner-img" alt="" />
        <div class="preview-banner-gradient"></div>
      </div>
      <!-- Flag -->
      <div class="preview-flag-wrapper">
        <img id="preview-flag" class="preview-flag" alt="" />
      </div>
      <!-- Content -->
      <div class="preview-content">
        <h2 id="preview-name" class="preview-title"></h2>
        <span id="preview-continent" class="preview-continent-badge"></span>

        <div class="preview-stats">
          <div class="preview-stat">
            <span class="preview-stat-label" data-i18n="capital">Capital</span>
            <span id="preview-capital" class="preview-stat-value"></span>
          </div>
          <div class="preview-stat">
            <span class="preview-stat-label">Population</span>
            <span id="preview-population" class="preview-stat-value"></span>
          </div>
          <div class="preview-stat">
            <span class="preview-stat-label" data-i18n="gdp">GDP</span>
            <span id="preview-gdp" class="preview-stat-value"></span>
          </div>
        </div>

        <div class="preview-description-section">
          <h3 class="preview-section-title" data-i18n="about">About</h3>
          <p id="preview-description" class="preview-description"></p>
        </div>

        <!-- Mini-map with capital dot -->
        <div class="preview-minimap-section">
          <h3 class="preview-section-title" data-i18n="capital_location">Capital Location</h3>
          <div id="preview-minimap" class="preview-minimap"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULTS MODAL -->
  <div id="results-modal" class="results-modal hidden">
    <div class="results-card">
      <button id="results-close" class="results-close">&times;</button>
      <div class="results-header">
        <div class="results-icon">📊</div>
        <h2 class="results-title" id="results-title">Results</h2>
      </div>
      <div class="results-main-stat">
        <span id="results-count" class="results-big">0</span>
        <span class="results-divider">/197</span>
        <span id="results-pct" class="results-pct">0%</span>
      </div>
      <div id="results-time" class="results-time hidden"></div>
      <div id="results-continents" class="results-continents"></div>
      <div class="results-missed-section">
        <h3 class="results-section-title" id="results-missed-title">Countries you missed</h3>
        <div id="results-missed-list" class="results-missed-list"></div>
      </div>
      <button id="results-restart-btn" class="btn-primary">Play Again</button>
    </div>
  </div>

  <!-- WIN MODAL -->
  <div id="win-modal" class="win-modal hidden">
    <div class="win-card">
      <div class="win-icon">&#127942;</div>
      <h2 class="win-title" data-i18n="win_title">Congratulations!</h2>
      <p class="win-subtitle" data-i18n="win_subtitle">You named all 197 countries!</p>
      <div id="win-time" class="win-time hidden"></div>
      <button id="win-restart-btn" class="btn-primary" data-i18n="play_again">Play Again</button>
    </div>
  </div>

  <!-- CDN SCRIPTS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="script.js?v=3"></script>

</body>
</html>
